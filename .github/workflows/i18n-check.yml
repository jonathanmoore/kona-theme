name: Translation Sync
on:
  pull_request:
    branches:
      - main
    paths:
      - 'theme/locales/en.default.json'
      - 'theme/locales/en.default.schema.json'

jobs:
  i18n:
    name: Sync Translations
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Check for stale translations
        id: check
        run: |
          if python3 scripts/translate-locales.py check; then
            echo "status=current" >> $GITHUB_OUTPUT
          else
            echo "status=stale" >> $GITHUB_OUTPUT
          fi

      - name: Sync translations
        if: steps.check.outputs.status == 'stale'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/translate-locales.py sync

      - name: Commit translations
        if: steps.check.outputs.status == 'stale'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add theme/locales/
          git commit -m "Sync translations (automated)" || exit 0
          git push
