# Netlify configuration for VitePress documentation site
# Only builds when docs/ directory changes

[build]
  base = "."
  publish = "docs/.vitepress/dist"
  command = "pnpm docs:build"

  # Skip build if no changes in docs directory or dependencies
  # Returns exit code 1 to skip build, 0 to proceed
  ignore = "bash scripts/netlify-should-build.sh"

# Deploy preview settings
[context.deploy-preview]
  command = "pnpm docs:build"

# Production settings
[context.production]
  command = "pnpm docs:build"

# Branch deploy settings
[context.branch-deploy]
  command = "pnpm docs:build"
