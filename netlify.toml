# Netlify configuration for VitePress documentation site
# Only builds when docs/ directory or dependencies change

[build]
  base = "."
  publish = "docs/.vitepress/dist"
  command = "pnpm docs:build"

  # Build only if docs-related files changed
  # Exit 0 = skip, Exit 1 = build
  # git diff --quiet returns 0 if no changes (skip), 1 if changes (build)
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- docs/ package.json pnpm-lock.yaml"

# Deploy preview settings
[context.deploy-preview]
  command = "pnpm docs:build"

# Production settings
[context.production]
  command = "pnpm docs:build"
